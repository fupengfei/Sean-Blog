services:
  frontend:
    build: ./frontend
    container_name: sean-blog-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8880
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: sean-blog-backend
    ports:
      - "8880:8880"
    volumes:
      - ./data/articles:/data/articles
      - ./data/skills:/data/skills
      - ./data/images:/data/images
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=sean_blog
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-devsecret}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-do-not-use-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - FILE_BASE_PATH=/data
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-devsecret}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sean-blog-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-devsecret}
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: sean-blog-mysql
    ports:
      - "3308:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-devsecret}
      - MYSQL_DATABASE=sean_blog
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    restart: unless-stopped
