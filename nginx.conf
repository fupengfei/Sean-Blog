# =============================================================================
# Sean's AI World Blog — Nginx 反向代理配置
# =============================================================================
# 作用：作为统一入口（端口 80），将请求分发到 Frontend (Next.js) 和 Backend (Spring Boot)
# 部署位置：可部署在 Docker 宿主机上，也可作为独立 Nginx 容器
# 特性：安全响应头、请求速率限制、WebSocket 支持、文件上传 50MB 限制
# =============================================================================

# ---- 上游服务器定义 ----
# Frontend 服务：Next.js 14，监听 3000 端口
upstream frontend { server frontend:3000; }
# Backend 服务：Spring Boot 4.x，监听 8880 端口
upstream backend { server backend:8880; }

server {
    listen 80;
    server_name _;                     # 匹配所有域名

    # =========================================================================
    # 安全响应头（响应所有请求时添加）
    # =========================================================================
    add_header X-Content-Type-Options "nosniff" always;                # 禁止浏览器 MIME 类型嗅探
    add_header X-Frame-Options "DENY" always;                          # 禁止页面被嵌入 iframe
    add_header X-XSS-Protection "1; mode=block" always;                # 启用浏览器 XSS 过滤器
    add_header Referrer-Policy "strict-origin-when-cross-origin" always; # 控制 Referer 信息发送策略
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always; # 禁用敏感硬件权限

    # =========================================================================
    # 请求速率限制（防止暴力破解和 API 滥用）
    # =========================================================================
    # 登录接口限流：同一 IP 每分钟最多 5 次
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    # 通用 API 限流：同一 IP 每分钟最多 30 次
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # 隐藏 nginx 版本号，减少信息泄露
    server_tokens off;

    # =========================================================================
    # / — 前端页面（Next.js）
    # 支持 WebSocket（Next.js HMR / 实时功能），通过 Upgrade 头升级连接
    # =========================================================================
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;          # WebSocket 升级头
        proxy_set_header Connection 'upgrade';           # 保持 WebSocket 连接
        proxy_set_header Host $host;                     # 传递原始 Host 头
        proxy_cache_bypass $http_upgrade;                # WebSocket 升级请求不缓存
    }

    # =========================================================================
    # /api/v1/admin/login — 管理后台登录接口
    # 严格的速率限制：每分钟最多 5 次，突发 3 次后直接拒绝（防止暴力破解）
    # =========================================================================
    location /api/v1/admin/login {
        limit_req zone=login burst=3 nodelay;            # 应用登录限流策略
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;         # 传递客户端真实 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 代理链 IP
    }

    # =========================================================================
    # /api/ — 后端 REST API（公开 + Admin 接口）
    # 通用速率限制：每分钟最多 30 次，突发 10 次
    # 最大上传文件大小：50MB（用于文章 MD 文件、Skill zip 包上传）
    # =========================================================================
    location /api/ {
        limit_req zone=api burst=10 nodelay;             # 应用 API 限流策略
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;         # 传递客户端真实 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 代理链 IP
        client_max_body_size 50m;                        # 文件上传限制 50MB
    }
}
