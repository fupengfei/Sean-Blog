server:
  port: 8880

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sean_blog}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always



mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sean.blog.module
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

file:
  base-path: ${FILE_BASE_PATH:/data}
  upload:
    articles: ${file.base-path}/articles
    skills: ${file.base-path}/skills
    images: ${file.base-path}/images
